services:
  # Microservices
  catalog:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: catalog
    container_name: ocommerce-catalog
    environment:
      PORT: 8081
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

